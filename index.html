<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BioBliss Life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #012a2c; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

if (!gl) {
  document.body.style.background = '#023234';
}

/* ── Vertex shader: fullscreen quad ──────────────────────── */
const VS = `
  attribute vec2 a_pos;
  void main() {
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }
`;

/* ── Fragment shader: metaball fluid ─────────────────────── */
const FS = `
  precision highp float;
  uniform float u_time;
  uniform vec2  u_res;

  /* Hash-based noise for subtle grain */
  float hash(vec2 p) {
    p = fract(p * vec2(234.34, 435.345));
    p += dot(p, p + 34.23);
    return fract(p.x * p.y);
  }
  float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(
      mix(hash(i),             hash(i + vec2(1,0)), f.x),
      mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
      f.y
    );
  }

  void main() {
    vec2 uv  = gl_FragCoord.xy / u_res;
    float ar = u_res.x / u_res.y;
    /* aspect-corrected coordinate space [0..ar, 0..1] */
    vec2 p   = vec2(uv.x * ar, uv.y);
    float t  = u_time * 0.14;

    /* ── BioBliss palette ──────────────────────────────── */
    vec3 base = vec3(0.008, 0.157, 0.165); /* #012829 */
    vec3 c1   = vec3(0.008, 0.318, 0.298); /* #025148 */
    vec3 c2   = vec3(0.012, 0.451, 0.369); /* #03735E */
    vec3 c3   = vec3(0.267, 0.608, 0.647); /* #449BA5 */
    vec3 c4   = vec3(0.376, 0.702, 0.624); /* #60B39F */

    vec2 cx = vec2(ar * 0.5, 0.5); /* canvas center */

    /* ── 10 blobs, each with exp(-k*d²) falloff ──────── */
    /* Large anchor blobs */
    vec2 b0  = cx + vec2(-0.36*ar + 0.14*ar*sin(t*0.61), 0.22 + 0.13*cos(t*0.47));
    vec2 b1  = cx + vec2( 0.32*ar + 0.12*ar*cos(t*0.55),  0.27 + 0.11*sin(t*0.73));
    vec2 b2  = cx + vec2( 0.04*ar*sin(t*0.39),            -0.30 + 0.13*cos(t*0.62));
    vec2 b3  = cx + vec2(-0.10*ar + 0.18*ar*cos(t*0.82),   0.05 + 0.09*sin(t*0.91));

    /* Mid blobs */
    vec2 b4  = cx + vec2( 0.20*ar*sin(t*1.05),             0.18 + 0.10*cos(t*0.78));
    vec2 b5  = cx + vec2(-0.24*ar + 0.09*ar*sin(t*1.20),  -0.18 + 0.12*cos(t*0.58));
    vec2 b6  = cx + vec2( 0.38*ar + 0.07*ar*cos(t*0.94),  -0.24 + 0.10*sin(t*1.10));

    /* Small highlight blobs */
    vec2 b7  = cx + vec2(-0.02*ar + 0.14*ar*cos(t*1.35),   0.30 + 0.06*sin(t*1.25));
    vec2 b8  = cx + vec2( 0.14*ar + 0.10*ar*sin(t*0.68),  -0.08 + 0.11*cos(t*1.42));
    vec2 b9  = cx + vec2(-0.30*ar + 0.07*ar*sin(t*1.15),  -0.26 + 0.08*cos(t*0.84));

    /* field accumulation */
    float f = 0.0;
    f += exp(-5.5  * dot(p-b0, p-b0));
    f += exp(-6.0  * dot(p-b1, p-b1));
    f += exp(-5.0  * dot(p-b2, p-b2));
    f += exp(-7.0  * dot(p-b3, p-b3));
    f += exp(-9.0  * dot(p-b4, p-b4));
    f += exp(-8.5  * dot(p-b5, p-b5));
    f += exp(-10.0 * dot(p-b6, p-b6));
    f += exp(-13.0 * dot(p-b7, p-b7));
    f += exp(-12.0 * dot(p-b8, p-b8));
    f += exp(-11.0 * dot(p-b9, p-b9));

    /* ── Map field to colour ──────────────────────────── */
    vec3 col = base;
    col = mix(col, c1, smoothstep(0.00, 0.35, f));
    col = mix(col, c2, smoothstep(0.30, 0.80, f));
    col = mix(col, c3, smoothstep(0.70, 1.60, f));
    col = mix(col, c4, smoothstep(1.40, 2.80, f));

    /* ── Subtle grain overlay ─────────────────────────── */
    float grain = noise(uv * 520.0 + u_time * 0.7) * 0.028 - 0.014;
    col += grain;

    /* ── Radial vignette ──────────────────────────────── */
    vec2 vig = uv - 0.5;
    float v  = 1.0 - dot(vig * vec2(1.0, 1.3), vig * vec2(1.0, 1.3)) * 1.75;
    col     *= clamp(v, 0.0, 1.0);

    /* ── Edge darkening (corners) ─────────────────────── */
    col = mix(base * 0.6, col, smoothstep(0.0, 0.55, v));

    gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
  }
`;

/* ── Compile helpers ─────────────────────────────────────── */
function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

/* ── Fullscreen triangle strip ──────────────────────────── */
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER,
  new Float32Array([-1,-1,  1,-1,  -1,1,  1,1]),
  gl.STATIC_DRAW
);
const posLoc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes  = gl.getUniformLocation(prog, 'u_res');

/* ── Resize ─────────────────────────────────────────────── */
function resize() {
  canvas.width  = window.innerWidth  * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

/* ── Render loop ─────────────────────────────────────────── */
function render(ms) {
  gl.uniform1f(uTime, ms * 0.001);
  gl.uniform2f(uRes,  canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
