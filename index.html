<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BioBliss Life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #023234;
      overflow: hidden;
    }

    /* ─── Stage ──────────────────────────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      background: #012a2c;
      overflow: hidden;
    }

    /* ─── Blob filter container ──────────────────────────────── */
    /* contrast() + blur() on parent makes blobs merge organically */
    .blobs {
      position: absolute;
      inset: -20%;
      width: 140%;
      height: 140%;
      filter: blur(60px) contrast(1.1);
    }

    /* ─── Individual blobs ───────────────────────────────────── */
    .blob {
      position: absolute;
      border-radius: 50%;
      will-change: transform, opacity;
    }

    /* Large background base blobs */
    .blob-1 {
      width: 75vw;
      height: 75vw;
      top: -20%;
      left: -15%;
      background: radial-gradient(circle, rgba(3,115,94,0.85) 0%, rgba(2,81,76,0.40) 50%, transparent 70%);
      animation: drift1 28s ease-in-out infinite;
    }
    .blob-2 {
      width: 65vw;
      height: 65vw;
      top: 10%;
      right: -20%;
      background: radial-gradient(circle, rgba(68,155,165,0.80) 0%, rgba(2,81,76,0.35) 50%, transparent 70%);
      animation: drift2 34s ease-in-out infinite;
    }
    .blob-3 {
      width: 80vw;
      height: 80vw;
      bottom: -30%;
      left: 10%;
      background: radial-gradient(circle, rgba(2,81,76,0.90) 0%, rgba(3,115,94,0.45) 50%, transparent 70%);
      animation: drift3 22s ease-in-out infinite;
    }

    /* Mid-layer accent blobs */
    .blob-4 {
      width: 45vw;
      height: 45vw;
      top: 30%;
      left: 25%;
      background: radial-gradient(circle, rgba(96,179,159,0.70) 0%, rgba(68,155,165,0.30) 50%, transparent 68%);
      animation: drift4 19s ease-in-out infinite;
    }
    .blob-5 {
      width: 38vw;
      height: 38vw;
      top: 5%;
      left: 45%;
      background: radial-gradient(circle, rgba(68,155,165,0.75) 0%, rgba(96,179,159,0.25) 55%, transparent 70%);
      animation: drift5 26s ease-in-out infinite;
    }
    .blob-6 {
      width: 42vw;
      height: 42vw;
      bottom: 5%;
      right: 5%;
      background: radial-gradient(circle, rgba(3,115,94,0.80) 0%, rgba(2,81,76,0.35) 50%, transparent 68%);
      animation: drift6 31s ease-in-out infinite;
    }

    /* Small highlight blobs */
    .blob-7 {
      width: 22vw;
      height: 22vw;
      top: 15%;
      left: 10%;
      background: radial-gradient(circle, rgba(96,179,159,0.90) 0%, rgba(68,155,165,0.40) 50%, transparent 70%);
      animation: drift7 17s ease-in-out infinite;
    }
    .blob-8 {
      width: 18vw;
      height: 18vw;
      bottom: 20%;
      left: 35%;
      background: radial-gradient(circle, rgba(68,155,165,0.85) 0%, transparent 65%);
      animation: drift8 21s ease-in-out infinite;
    }
    .blob-9 {
      width: 25vw;
      height: 25vw;
      top: 50%;
      right: 15%;
      background: radial-gradient(circle, rgba(96,179,159,0.75) 0%, rgba(3,115,94,0.30) 55%, transparent 70%);
      animation: drift9 24s ease-in-out infinite;
    }

    /* ─── Keyframes ───────────────────────────────────────────── */
    @keyframes drift1 {
      0%   { transform: translate(0%,    0%)    scale(1.00); }
      25%  { transform: translate(8%,    5%)    scale(1.06); }
      50%  { transform: translate(4%,    12%)   scale(0.97); }
      75%  { transform: translate(-5%,   7%)    scale(1.04); }
      100% { transform: translate(0%,    0%)    scale(1.00); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0%,    0%)    scale(1.03); }
      30%  { transform: translate(-9%,   6%)    scale(0.96); }
      60%  { transform: translate(-4%,   -8%)   scale(1.07); }
      100% { transform: translate(0%,    0%)    scale(1.03); }
    }
    @keyframes drift3 {
      0%   { transform: translate(0%,    0%)    scale(1.00); }
      20%  { transform: translate(6%,    -7%)   scale(1.05); }
      55%  { transform: translate(-4%,   -12%)  scale(0.95); }
      80%  { transform: translate(8%,    -5%)   scale(1.03); }
      100% { transform: translate(0%,    0%)    scale(1.00); }
    }
    @keyframes drift4 {
      0%   { transform: translate(0%,    0%)    scale(1.00); }
      33%  { transform: translate(-10%,  -8%)   scale(1.08); }
      66%  { transform: translate(7%,    10%)   scale(0.94); }
      100% { transform: translate(0%,    0%)    scale(1.00); }
    }
    @keyframes drift5 {
      0%   { transform: translate(0%,    0%)    scale(1.02); }
      40%  { transform: translate(11%,   7%)    scale(0.96); }
      70%  { transform: translate(-6%,   -9%)   scale(1.06); }
      100% { transform: translate(0%,    0%)    scale(1.02); }
    }
    @keyframes drift6 {
      0%   { transform: translate(0%,    0%)    scale(0.98); }
      25%  { transform: translate(-8%,   -6%)   scale(1.05); }
      65%  { transform: translate(5%,    8%)    scale(1.01); }
      100% { transform: translate(0%,    0%)    scale(0.98); }
    }
    @keyframes drift7 {
      0%   { transform: translate(0%,    0%)    scale(1.00); }
      50%  { transform: translate(14%,   -12%)  scale(1.10); }
      100% { transform: translate(0%,    0%)    scale(1.00); }
    }
    @keyframes drift8 {
      0%   { transform: translate(0%,    0%)    scale(1.05); }
      45%  { transform: translate(-12%,  9%)    scale(0.95); }
      100% { transform: translate(0%,    0%)    scale(1.05); }
    }
    @keyframes drift9 {
      0%   { transform: translate(0%,    0%)    scale(1.00); }
      35%  { transform: translate(9%,    -11%)  scale(1.07); }
      70%  { transform: translate(-7%,   6%)    scale(0.96); }
      100% { transform: translate(0%,    0%)    scale(1.00); }
    }

    /* ─── Noise texture overlay ──────────────────────────────── */
    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 10;
    }

    /* ─── Edge vignette ──────────────────────────────────────── */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 85% 85% at 50% 50%,
        transparent 40%,
        rgba(1, 28, 30, 0.45) 75%,
        rgba(1, 20, 22, 0.80) 100%);
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

<div class="stage">
  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
    <div class="blob blob-6"></div>
    <div class="blob blob-7"></div>
    <div class="blob blob-8"></div>
    <div class="blob blob-9"></div>
  </div>
  <div class="vignette"></div>
  <div class="noise"></div>
</div>

</body>
</html>
